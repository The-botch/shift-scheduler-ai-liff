<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>シフト希望入力</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      :root {
        --green: #16a34a;
        --green-weak: #dcfce7;
        --green-strong: #0f7a37;
        --red: #dc2626;
        --red-weak: #fee2e2;
        --gray: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --card: #ffffff;
        --bg: #f3f4f6;
        --accent: #10b981;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP',
          'Yu Gothic UI', 'Yu Gothic', Meiryo, sans-serif;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px;
      }
      .card {
        background: var(--card);
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        padding: 16px;
      }
      .title {
        font-weight: 700;
        font-size: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .badge {
        background: #e8f5ff;
        color: #0369a1;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .pill {
        cursor: pointer;
        border-radius: 999px;
        border: 1px solid var(--gray);
        padding: 8px 14px;
        font-weight: 600;
      }
      .pill.active-pt {
        background: var(--green-weak);
        border-color: var(--green);
        color: var(--green-strong);
      }
      .pill.active-em {
        background: var(--red-weak);
        border-color: var(--red);
        color: #7f1d1d;
      }
      .helper {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }
      .calendar {
        margin-top: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 6px;
      }
      .dow {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }
      .cell {
        position: relative;
        border: 1px solid var(--gray);
        background: #fff;
        border-radius: 12px;
        aspect-ratio: 1/1.05;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        cursor: pointer;
        user-select: none;
        transition: transform 0.05s ease;
        min-width: 0;
        overflow: hidden;
      }
      .cell:active {
        transform: scale(0.98);
      }
      .cell.disabled {
        opacity: 0.35;
        pointer-events: none;
      }
      .cell .d {
        font-weight: 700;
      }
      .cell.pt-selected {
        background: var(--green-weak);
        border-color: var(--green);
      }
      .cell.pt-selected .label {
        background: var(--green);
        color: #fff;
      }
      .cell.em-selected {
        background: var(--red-weak);
        border-color: var(--red);
      }
      /* 社員向け：第1案で出勤予定がある日（緑枠） */
      .cell.first-plan-day {
        border: 2px solid var(--green);
      }
      .cell.first-plan-day .shift-time {
        font-size: 6px;
        color: var(--green);
        font-weight: 600;
        white-space: nowrap;
      }
      /* 選択時は赤で上書き */
      .cell.first-plan-day.em-selected {
        background: var(--red-weak);
        border-color: var(--red);
      }
      .cell.first-plan-day.em-selected .shift-time {
        color: #b91c1c;
      }
      .label {
        font-size: 6px;
        padding: 2px 3px;
        border-radius: 8px;
        text-align: center;
        line-height: 1.2;
        white-space: pre-line;
        max-width: 100%;
      }
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 12px 0;
      }
      .btn {
        appearance: none;
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn-primary {
        background: var(--green);
        color: #fff;
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-outline {
        background: #fff;
        border: 1px solid var(--gray);
      }
      .select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--gray);
        border-radius: 12px;
        background: #fff;
      }
      .time-input {
        width: auto;
        max-width: 140px;
        flex: 0 0 auto;
        font-size: 18px;
      }
      .time-select-group {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .time-select-hour {
        width: auto;
        min-width: 90px;
        padding: 8px 10px;
        font-size: 16px;
      }
      .time-select-minute {
        width: auto;
        min-width: 70px;
        padding: 8px 10px;
        font-size: 16px;
      }
      .input-mode-toggle {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      .toggle-btn {
        flex: 1;
        appearance: none;
        border: 1px solid var(--gray);
        border-radius: 12px;
        padding: 10px 12px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        background: #fff;
        color: #333;
        text-align: center;
      }
      .toggle-btn.active {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
      }
      .footerbar {
        position: sticky;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(6px);
        border-top: 1px solid var(--gray);
        padding: 10px;
      }
      .flex {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .grow {
        flex: 1;
      }
      .green {
        color: var(--green-strong);
      }
      .muted {
        color: var(--muted);
      }
      .success {
        background: var(--green-weak);
        border: 1px solid var(--green);
        color: var(--green-strong);
        padding: 10px;
        border-radius: 10px;
      }
      .danger {
        background: var(--red-weak);
        border: 1px solid var(--red);
        color: #7f1d1d;
        padding: 10px;
        border-radius: 10px;
      }
      .section-title {
        font-weight: 700;
        margin: 6px 0 4px;
      }
      .small {
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- ヘッダ -->
      <div class="card" style="margin-bottom: 12px">
        <div class="title">
          シフト希望入力 <span class="badge">ベータ</span>
        </div>
        <div id="profileBox" class="helper" style="margin-top: 6px">
          LINEログイン前です

      <!-- スタッフ選択 -->

        <div

            display: none;
            margin-top: 6px;

          "

          <!-- スタッフ情報を表示 -->
        </div>
      </div>

      <!-- 役割選択（自動判定に変更） -->
      <div class="card" style="margin-bottom: 12px">
        <div class="section-title">入力タイプ</div>
        <div

      </div>

      <!-- 月選択＆パターン/時刻 -->
      <div class="card" style="margin-bottom: 12px">
        <div class="toolbar">
          <div class="flex">
            <button class="btn btn-outline" id="prevMonth">＜</button>
            <div id="ymLabel" style="font-weight: 700"></div>
            <button class="btn btn-outline" id="nextMonth">＞</button>
          </div>
          <!-- MVP: パターン入力を廃止 (Issue #103) -->
          <!--
          <select id="modeSelect" class="select" style="max-width: 220px">
            <option value="pattern">
              パターンで入力（早番/遅番/通し/どの時間帯でも可）
            </option>
            <option value="time">時刻で入力（自由入力）</option>
          </select>
          -->
        </div>

        <!-- MVP: パターン入力を廃止 (Issue #103) -->
        <!--
        <div id="patternBox">
          <div class="section-title">パターン</div>
          <div class="row" id="patternRow">
          </div>
          <div class="helper small">
            選んだパターンが、カレンダーで新規選択した日に適用されます。
          </div>
        </div>
        -->

        <!-- 入力モード切替（アルバイトのみ表示） -->
        <div id="inputModeToggle" style="margin-top: 10px; display: none">
          <div class="input-mode-toggle">
            <button class="toggle-btn active" id="modeTimeBtn">時刻入力</button>
            <button class="toggle-btn" id="modeAlldayBtn">希望日入力</button>
          </div>
        </div>

        <!-- 希望日入力モードのメッセージ -->
        <div id="alldayBox" style="margin-top: 10px; display: none">
          <div class="section-title">希望日入力</div>
          <div class="helper small">

            ※ 05:00〜29:00（終日）で登録されます

        </div>

        <!-- 時刻入力 -->
        <div id="timeBox" style="margin-top: 10px">
          <div class="section-title">時刻入力</div>
          <div class="row">
            <div class="time-select-group">
              <select id="startHour" class="select time-select-hour">
                <option value="5">5時</option>
                <option value="6">6時</option>
                <option value="7">7時</option>
                <option value="8">8時</option>
                <option value="9" selected>9時</option>
                <option value="10">10時</option>
                <option value="11">11時</option>
                <option value="12">12時</option>
                <option value="13">13時</option>
                <option value="14">14時</option>
                <option value="15">15時</option>
                <option value="16">16時</option>
                <option value="17">17時</option>
                <option value="18">18時</option>
                <option value="19">19時</option>
                <option value="20">20時</option>

                <option value="7">7時</option>

                <option value="9">9時</option>
                <option value="10">10時</option>
                <option value="11">11時</option>
                <option value="12">12時</option>
                <option value="13">13時</option>
                <option value="14">14時</option>
                <option value="15">15時</option>
                <option value="16">16時</option>
                <option value="17">17時</option>
                <option value="18" selected>18時</option>
                <option value="19">19時</option>
                <option value="20">20時</option>
                <option value="21">21時</option>
                <option value="22">22時</option>
                <option value="23">23時</option>
                <option value="24">24時（翌0時）</option>

      <!-- カレンダー -->
      <div class="card">
        <div class="calendar">
          <div class="grid" id="dowRow"></div>
          <div class="grid" id="calGrid" style="margin-top: 6px"></div>
        </div>
        <div id="tipBox" class="helper" style="margin-top: 10px"></div>

          id="resultBox"
          class="success"

      <!-- 月次コメント入力 -->
      <div class="card" style="margin-top: 12px" id="commentSection">

          style="

            align-items: center;

    <script>
      // ====== 設定（あなたの値に変更） ======

      // 環境に応じてLIFF IDを自動切り替え
      function getLiffId() {
        const hostname = window.location.hostname;

        // ローカル開発環境
        if (hostname === 'localhost' || hostname === '127.0.0.1') {
          return '2008227932-M3lLVLVv'; // STG用LIFF ID
        }

        // 本番環境（完全一致のみ）
        if (hostname === 'shift-scheduler-ai-liff.vercel.app') {
          return '2008227932-Rq9rJrJn'; // 本番用LIFF ID
        }

        // それ以外のVercelドメイン = STG環境（Preview/staging）
        return '2008227932-M3lLVLVv'; // STG用LIFF ID
      }

      const LIFF_ID = getLiffId();

      // 環境に応じてAPIベースURLを自動切り替え
      function getApiBase() {
        const hostname = window.location.hostname;

        // ローカル開発環境
        if (hostname === 'localhost' || hostname === '127.0.0.1') {
          return 'http://localhost:3001';
        }

        // 本番環境（完全一致のみ）
        if (hostname === 'shift-scheduler-ai-liff.vercel.app') {
          return 'https://shift-scheduler-ai-production.up.railway.app';
        }

        // それ以外のVercelドメイン = STG環境（Preview/staging）
        return 'https://shift-scheduler-ai-staging.up.railway.app';
      }

      const API_BASE = getApiBase();
      const TENANT_ID = 3; // テナントID (Stand Banh Mi)

      // デバッグ用: 環境情報をコンソールに表示
      console.log('🌍 Environment:', window.location.hostname);
      console.log('🔗 API Base URL:', API_BASE);
      console.log('🆔 LIFF ID:', LIFF_ID);

      // 締切チェック機能（テスト時はfalseに設定）
      const ENABLE_DEADLINE_CHECK = true; // ← テスト時はfalseにする

      // パターン → 時刻（必要に応じて後で編集可能）
      const PATTERNS = [
        { key: '早番', start: '09:00', end: '18:00' },
        { key: '遅番', start: '13:00', end: '22:00' },
        { key: '通し', start: '10:00', end: '20:00' },
        { key: 'どの時間帯でも可', start: '09:00', end: '22:00' },
      ];

      // ====== 状態 ======
      let staffList = []; // スタッフリスト
      let storeList = []; // 店舗リスト
      let selectedStaff = null; // 選択中のスタッフ
      let role = 'part'; // "part"=アルバイト, "emp"=社員
      // MVP: パターン入力を廃止 (Issue #103) - 時刻入力のみに固定
      let mode = 'time'; // "pattern" or "time"
      let cur = new Date();
      const currentDay = cur.getDate();
      if (currentDay <= 25) {
        cur.setMonth(cur.getMonth() + 1); // 来月
      } else {
        cur.setMonth(cur.getMonth() + 2); // 再来月
      }
      cur.setDate(1); // 月の先頭
      let selected = new Map(); // key=YYYY-MM-DD, val={type:'part'|'emp', start,end,label}
      let currentPattern = PATTERNS[0];
      let employmentTypesMap = new Map(); // employment_code -> {employment_name}
      let rolesMap = new Map(); // role_code -> role_id のマッピング
      let deadlineSettingsMap = new Map(); // employment_type -> {deadline_day, deadline_time, is_enabled}
      let firstPlanWorkDays = []; // 社員用: 第一案の出勤日リスト (YYYY-MM-DD形式)
      let firstPlanShiftTimes = new Map(); // 社員用: 第一案の出勤日→時刻 (YYYY-MM-DD -> {start, end})
      let firstPlanExists = false; // アルバイト用: 第1案が存在するかどうか
      let firstPlanExistsForEmp = false; // 社員用: 第1案が存在するかどうか（シフト有無とは別）
      let monthlyCommentData = null; // 月次コメントデータ

      // ====== 時刻表示フォーマット ======
      /**
       * 時刻を短縮形式で表示（分が00の場合は省略）
       * @param {string} time - HH:MM形式の時刻
       * @returns {string} 短縮形式（例: "09:00" → "9", "09:30" → "9:30"）
       */
      function formatTime(time) {
        if (!time) return '';
        const [h, m] = time.split(':');
        const hour = h.replace(/^0/, '');
        return m === '00' ? hour : `${hour}:${m}`;
      }

      // ====== 締切判定 ======
      /**
       * N月のシフト希望入力締切をチェック（雇用形態別）
       * @param {number} year - 対象年
       * @param {number} month - 対象月 (1-12)
       * @param {string} employmentType - 雇用形態 ('FULL_TIME', 'PART_TIME')
       * @returns {boolean} true=締切過ぎている（または期間外）, false=まだ入力可能
       */
      function isDeadlinePassed(year, month, employmentType) {
        // 締切チェックが無効の場合は常に入力可能
        if (!ENABLE_DEADLINE_CHECK) {
          return false;
        }

        // employmentTypeが指定されていない場合は従来のロジック（後方互換性）
        if (!employmentType) {
          console.warn('employmentType未指定、デフォルト期限を使用');
          employmentType = 'PART_TIME'; // デフォルトはアルバイト
        }

        const setting = deadlineSettingsMap.get(employmentType);

        // 期限設定が無効の場合は常に入力可能
        if (!setting || !setting.is_enabled) {
          return false;
        }

        const now = new Date();
        let periodYear = year;
        let periodMonth = month - 1;

        // 1月の場合は前年12月が締切月
        if (periodMonth === 0) {
          periodYear--;
          periodMonth = 12;
        }

        // start_dayがNULLでない場合のみ開始日チェック
        if (setting.start_day !== null && setting.start_day !== undefined) {
          const startDate = new Date(
            periodYear,
            periodMonth - 1,
            setting.start_day,
            0,
            0,
            0
          );

          // まだ入力期間前
          if (now < startDate) {
            return true;
          }
        }

        // 締切日チェック
        // deadline_time を "HH:MM" 形式からパース
        const [hour, minute] = setting.deadline_time.split(':').map(Number);
        const endDate = new Date(
          periodYear,
          periodMonth - 1,
          setting.deadline_day,
          hour,
          minute,
          59
        );

        return now > endDate;
      }

      // ====== スタッフと店舗データ読み込み ======
      async function loadStaffAndStores() {
        try {
          const [staffRes, storeRes] = await Promise.all([
            fetch(`${API_BASE}/api/master/staff?tenant_id=${TENANT_ID}`),
            fetch(`${API_BASE}/api/master/stores?tenant_id=${TENANT_ID}`),
          ]);

          const staffData = await staffRes.json();
          const storeData = await storeRes.json();

          if (staffData.success) {
            staffList = staffData.data.filter(s => s.is_active);
            populateStaffSelect();
          }

          if (storeData.success) {
            storeList = storeData.data;
            populateStoreSelect();
          }
        } catch (error) {
          console.error('データ読み込みエラー:', error);
          alert('スタッフ・店舗データの読み込みに失敗しました');
        }
      }

      // ====== 雇用形態マスタ読み込み ======
      async function loadEmploymentTypes() {
        try {
          const res = await fetch(
            `${API_BASE}/api/master/employment-types?tenant_id=${TENANT_ID}`
          );
          const data = await res.json();

          if (data.success) {
            data.data.forEach(empType => {
              employmentTypesMap.set(empType.employment_code, {
                employment_name: empType.employment_name,
              });
            });

          console.error('雇用形態マスタ読み込みエラー:', error);

      async function loadDeadlineSettings() {

            `${API_BASE}/api/liff/deadline-settings?tenant_id=${TENANT_ID}`
          );

      // ====== 月次コメント読み込み ======
      async function loadMonthlyComment() {
        if (!selectedStaff || !window._login) {
          monthlyCommentData = null;
          updateCommentUI();
          return;
        }

        const year = cur.getFullYear();
        const month = cur.getMonth() + 1;

        try {
          const res = await fetch(
            `${API_BASE}/api/liff/monthly-submission?year=${year}&month=${month}`,
            {
              headers: {
                Authorization: `Bearer ${window._login.idToken}`,
              },
            }
          );
          const data = await res.json();

          if (data.success && data.data) {
            monthlyCommentData = data.data;
            document.getElementById('monthlyComment').value =
              data.data.comment || '';
          } else {
            monthlyCommentData = null;
            document.getElementById('monthlyComment').value = '';
          }
          updateCommentUI();
        } catch (error) {
          console.error('月次コメント取得エラー:', error);
          monthlyCommentData = null;
          updateCommentUI();
        }
      }

      // ====== 月次コメント保存 ======
      async function saveMonthlyComment() {
        if (!selectedStaff || !window._login) {
          return { success: false, error: 'スタッフ情報がありません' };
        }

        const year = cur.getFullYear();
        const month = cur.getMonth() + 1;
        const comment = document.getElementById('monthlyComment').value.trim();

        // コメントが空で、既存データもない場合はスキップ
        if (!comment && !monthlyCommentData) {
          return { success: true, skipped: true };
        }

        try {
          const res = await fetch(`${API_BASE}/api/liff/monthly-submission`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${window._login.idToken}`,
            },
            body: JSON.stringify({
              year: year,
              month: month,
              comment: comment || null,
            }),
          });
          const data = await res.json();

          if (data.success) {
            monthlyCommentData = data.data;
            updateCommentStatus('保存しました', 'success');
          }
          return data;
        } catch (error) {
          console.error('月次コメント保存エラー:', error);
          updateCommentStatus('保存に失敗しました', 'error');
          return { success: false, error: error.message };
        }
      }

      // ====== コメントUI更新 ======
      function updateCommentUI() {
        const textarea = document.getElementById('monthlyComment');
        const charCount = document.getElementById('commentCharCount');
        const section = document.getElementById('commentSection');

        // スタッフ未選択時は非表示
        if (!selectedStaff) {
          section.style.display = 'none';
          return;
        }
        section.style.display = 'block';

        // 文字数カウント
        const len = textarea.value.length;
        charCount.textContent = `${len}/500`;
        charCount.style.color = len > 450 ? 'var(--red)' : 'var(--muted)';
      }

      // ====== コメントステータス更新 ======
      function updateCommentStatus(message, type) {
        const status = document.getElementById('commentStatus');
        status.textContent = message;
        status.style.color =
          type === 'success'
            ? 'var(--green)'
            : type === 'error'
              ? 'var(--red)'
              : 'var(--muted)';

        // 3秒後にクリア
        setTimeout(() => {
          status.textContent = '';
        }, 3000);
      }

      // ====== 雇用形態を取得 ======
      function getEmploymentType() {
        if (!selectedStaff || !selectedStaff.employment_type) {
          return 'PART_TIME'; // デフォルト
        }
        return selectedStaff.employment_type;
      }

      // ====== 雇用形態から役割を判定 ======
      function determineRoleFromEmploymentType(employmentTypeCode) {
        // employment_typeで直接判定
        return employmentTypeCode === 'PART_TIME' ? 'part' : 'emp';
      }

      // ====== 雇用形態から役職IDを判定 ======
      function determineRoleIdFromEmploymentType(employmentTypeCode) {
        // employment_typeで直接判定
        const roleCode =
          employmentTypeCode === 'PART_TIME' ? 'STAFF' : 'SENIOR';
        const roleId = rolesMap.get(roleCode);

        if (!roleId) {
          console.warn('役職が見つかりません:', roleCode);
          return null;
        }

        return roleId;
      }

      // ====== 第1案データ取得（社員のみ） ======
      async function loadFirstPlanIfEmployee() {
        if (role !== 'emp' || !selectedStaff) {
          firstPlanWorkDays = [];
          firstPlanShiftTimes.clear();
          firstPlanExistsForEmp = false;
          return;
        }

        const year = cur.getFullYear();
        const month = cur.getMonth() + 1;

        try {
          // 1. まず第1案の存在をチェック
          const plansRes = await fetch(
            `${API_BASE}/api/shifts/plans?tenant_id=${TENANT_ID}&store_id=${selectedStaff.store_id}&year=${year}&month=${month}`
          );
          const plansData = await plansRes.json();

          if (!plansData.success) {
            firstPlanExistsForEmp = false;
            firstPlanWorkDays = [];
            firstPlanShiftTimes.clear();
            console.warn(`${year}年${month}月のプラン取得に失敗しました`);
            updateRoleInfo();
            return;
          }

          const firstPlan = plansData.data.find(
            plan => plan.plan_type === 'FIRST'
          );
          firstPlanExistsForEmp = !!firstPlan;

          if (!firstPlanExistsForEmp) {
            // 第1案が存在しない
            firstPlanWorkDays = [];
            firstPlanShiftTimes.clear();
            console.warn(`${year}年${month}月の第1案が未作成です`);
            updateRoleInfo();
            return;
          }

          console.log(
            `${year}年${month}月の第1案が存在します（plan_id: ${firstPlan.plan_id}）`
          );

          // 2. 第1案が存在する場合、このスタッフのシフトを全店舗から取得
          // （社員は所属店舗以外でも勤務する可能性があるため）
          const firstPlanRes = await fetch(
            `${API_BASE}/api/shifts/?tenant_id=${TENANT_ID}&staff_id=${selectedStaff.staff_id}&year=${year}&month=${month}&plan_type=FIRST`
          );
          const firstPlanData = await firstPlanRes.json();

          if (!firstPlanData.success || firstPlanData.count === 0) {
            // 第1案はあるがシフトなし
            firstPlanWorkDays = [];
            firstPlanShiftTimes.clear();
            console.warn(
              `${year}年${month}月の第1案にあなたのシフトがありません`
            );
          } else {
            // 出勤日リストと時刻情報を作成
            firstPlanWorkDays = firstPlanData.data.map(
              shift => shift.shift_date
            );
            firstPlanShiftTimes.clear();
            firstPlanData.data.forEach(shift => {
              firstPlanShiftTimes.set(shift.shift_date, {
                start: shift.start_time,
                end: shift.end_time,
              });
            });
            console.log(
              `${year}年${month}月の第1案: ${firstPlanWorkDays.length}日の出勤予定`
            );
          }
        } catch (error) {
          console.error('第一案取得エラー:', error);
          firstPlanExistsForEmp = false;
          firstPlanWorkDays = [];
          firstPlanShiftTimes.clear();
        }

        // UIを更新
        updateRoleInfo();
      }

      // ====== 第1案存在チェック（アルバイト用） ======
      async function checkFirstPlanExists() {
        if (!selectedStaff) {
          firstPlanExists = false;
          return;
        }

        const year = cur.getFullYear();
        const month = cur.getMonth() + 1;

        try {
          const plansRes = await fetch(
            `${API_BASE}/api/shifts/plans?tenant_id=${TENANT_ID}&store_id=${selectedStaff.store_id}&year=${year}&month=${month}`
          );
          const plansData = await plansRes.json();

          if (!plansData.success) {
            firstPlanExists = false;
            console.warn(`${year}年${month}月のプラン取得に失敗しました`);
            return;
          }

          // plan_type='FIRST' のプランが存在するかチェック
          const firstPlan = plansData.data.find(
            plan => plan.plan_type === 'FIRST'
          );

          firstPlanExists = !!firstPlan;

          if (firstPlanExists) {
            console.log(
              `${year}年${month}月の第1案が存在します（plan_id: ${firstPlan.plan_id}）`
            );
          } else {
            console.warn(`${year}年${month}月の第1案が未作成です`);
          }
        } catch (error) {
          console.error('第1案存在チェックエラー:', error);
          firstPlanExists = false;
        }
      }

      // ====== 店舗セレクトボックス生成 ======
      function populateStoreSelect() {
        const select = document.getElementById('storeSelect');
        storeList.forEach(store => {
          const option = document.createElement('option');
          option.value = store.store_id;
          option.textContent = store.store_name;
          select.appendChild(option);
        });
      }

      // ====== スタッフセレクトボックス生成 ======
      function populateStaffSelect(storeId = null) {
        const select = document.getElementById('staffSelect');
        select.innerHTML = '<option value="">選択してください</option>';

        const filteredStaff = storeId
          ? staffList.filter(s => s.store_id == storeId)
          : staffList;

        filteredStaff.forEach(staff => {
          const option = document.createElement('option');
          option.value = staff.staff_id;
          option.dataset.staff = JSON.stringify(staff);
          option.textContent = `${staff.name} (${staff.staff_code}) - ${staff.store_name}`;
          select.appendChild(option);
        });

        // 最初のスタッフを自動選択
        if (filteredStaff.length > 0) {
          select.value = filteredStaff[0].staff_id;
          handleStaffChange();
        }
      }

      // ====== スタッフ選択時の処理 ======
      async function handleStaffChange() {
        const select = document.getElementById('staffSelect');
        const staffId = parseInt(select.value);

        if (!staffId) {
          selectedStaff = null;
          document.getElementById('staffInfo').style.display = 'none';
          document.getElementById('roleInfo').innerHTML =
            'スタッフを選択すると、雇用形態に応じて自動設定されます';
          return;
        }

        const selectedOption = select.options[select.selectedIndex];
        selectedStaff = JSON.parse(selectedOption.dataset.staff);

        // 雇用形態により役割を自動設定（payment_typeベース）
        const employmentType = selectedStaff.employment_type;
        role = determineRoleFromEmploymentType(employmentType);

        // 第1案の存在チェック（社員は自分のシフトも取得、アルバイトは存在のみ）
        if (role === 'emp') {
          await loadFirstPlanIfEmployee();
        } else {
          await checkFirstPlanExists();
        }

        // スタッフ情報表示
        const staffInfo = document.getElementById('staffInfo');
        const inputTypeText = role === 'part' ? 'アルバイト' : '社員';
        staffInfo.style.display = 'block';
        staffInfo.innerHTML = `
      <strong>選択中:</strong> ${selectedStaff.name} さん<br>
      <strong>シフト入力方式:</strong> ${inputTypeText}
    `;

        // 既存のシフト希望を読み込み
        selected.clear();
        await loadExistingPreferences();
        renderCal();
        refreshTips();
      }

      // ====== 既存シフト希望読み込み（1日1レコード形式対応） ======
      async function loadExistingPreferences() {
        if (!selectedStaff) return;

        try {
          const year = cur.getFullYear();
          const month = cur.getMonth() + 1;

          // date_from, date_toで期間指定（月の1日〜末日）
          const firstDay = `${year}-${String(month).padStart(2, '0')}-01`;
          const lastDay = new Date(year, month, 0).getDate();
          const lastDayStr = `${year}-${String(month).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;

          const url = `${API_BASE}/api/shifts/preferences?tenant_id=${TENANT_ID}&staff_id=${selectedStaff.staff_id}&date_from=${firstDay}&date_to=${lastDayStr}`;
          const res = await fetch(url);
          const data = await res.json();

          if (data.success && data.data && data.data.length > 0) {
            // 1日1レコード形式のデータを復元
            data.data.forEach(pref => {
              // preference_dateがISO形式（2026-01-01T00:00:00.000Z）の場合、YYYY-MM-DD形式に変換
              const dateKey = pref.preference_date.split('T')[0];

              const label = pref.is_ng
                ? '休み'
                : pref.start_time && pref.end_time
                  ? `${formatTime(pref.start_time)}-${formatTime(pref.end_time)}`
                  : 'OK';

              selected.set(dateKey, {
                type: pref.is_ng ? 'emp' : 'part',
                start: pref.start_time || null,
                end: pref.end_time || null,
                label: label,
              });
            });

            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('resultBox').textContent =
              `既存のシフト希望が読み込まれました（${data.data.length}日分）`;
          } else {
            document.getElementById('resultBox').style.display = 'none';
          }
        } catch (error) {
          console.error('シフト希望読み込みエラー:', error);
        }
      }

      // ====== 店舗フィルター変更 ======
      document.getElementById('storeSelect').addEventListener('change', e => {
        const storeId = e.target.value || null;
        populateStaffSelect(storeId);
      });

      // ====== スタッフ選択変更 ======
      document
        .getElementById('staffSelect')
        .addEventListener('change', handleStaffChange);

      // ====== LIFF ======
      async function initLIFF() {
        // 期限切れトークンをクリア（iOS対策）
        try {
          const storageKey = `LIFF_STORE:${LIFF_ID}:decodedIDToken`;
          const stored = localStorage.getItem(storageKey);
          if (stored) {
            const decoded = JSON.parse(stored);
            if (decoded.exp && decoded.exp * 1000 < Date.now()) {
              console.log('期限切れトークンをクリアします');
              localStorage.removeItem(storageKey);
              localStorage.removeItem(`LIFF_STORE:${LIFF_ID}:accessToken`);
            }
          }
        } catch (e) {
          console.warn('トークンクリア処理でエラー:', e);
        }

        await liff.init({ liffId: LIFF_ID });
        await liff.ready; // LIFF初期化完了を待機

        // 雇用形態マスタを先に読み込み（役割判定に必要）
        await loadEmploymentTypes();

        if (!liff.isLoggedIn()) {
          // LINEアプリ内で未ログインの場合は自動ログイン
          if (liff.isInClient()) {
            console.log(
              'LINEアプリ内で未ログイン状態。自動ログインを試みます。'
            );
            liff.login();
            return;
          }

          // 外部ブラウザの場合はログインボタンを表示
          const cards = document.querySelectorAll('.card');
          cards.forEach((card, index) => {
            if (index > 0) {
              card.style.display = 'none';
            }
          });
          document.querySelector('.footerbar').style.display = 'none';

          document.getElementById('profileBox').innerHTML =
            `LINEログインが必要です。<button class="btn btn-primary" onclick="liff.login()">ログイン</button>`;
          return;
        }
        const p = await liff.getProfile();
        const idt = liff.getIDToken();

        // IDトークンが取得できない場合は再ログイン
        if (!idt) {
          console.error('IDトークンの取得に失敗しました。再ログインします。');
          liff.login();
          return;
        }

        window._login = { name: p.displayName, userId: p.userId, idToken: idt };
        document.getElementById('profileBox').textContent =
          `${p.displayName} さんとしてログイン中`;

        // LINE連携状態をチェック
        await checkLineLink();
      }

      // ====== LINE連携チェック ======
      async function checkLineLink() {
        try {
          const res = await fetch(`${API_BASE}/api/liff/check-link`, {
            headers: {
              Authorization: `Bearer ${window._login.idToken}`,
            },
          });
          const data = await res.json();

          if (data.success && data.linked) {
            // 連携済み：通常のシフト入力画面を表示
            selectedStaff = {
              staff_id: data.data.staff_id,
              name: data.data.staff_name,
              store_id: data.data.store_id,
              store_name: data.data.store_name,
              employment_type: data.data.employment_type,
            };
            role = determineRoleFromEmploymentType(data.data.employment_type);

            // 第1案の存在チェック（社員は自分のシフトも取得、アルバイトは存在のみ）
            if (role === 'emp') {
              await loadFirstPlanIfEmployee();
            } else {
              await checkFirstPlanExists();
            }

            // スタッフ情報を表示（セレクトボックスは非表示）
            document.getElementById('storeSelect').parentElement.style.display =
              'none';
            document.getElementById('staffSelect').parentElement.style.display =
              'none';

            // 登録済みスタッフ情報を表示
            const inputTypeText = role === 'part' ? 'アルバイト' : '社員';
            document.getElementById('staffInfo').style.display = 'block';
            document.getElementById('staffInfo').innerHTML = `
          <strong>🏪 店舗:</strong> ${selectedStaff.store_name}<br>
          <strong>👤 スタッフ:</strong> ${selectedStaff.name} さん<br>
          <strong>📝 シフト入力方式:</strong> ${inputTypeText}
        `;

            document.getElementById('profileBox').innerHTML =
              `${window._login.name} さん（${selectedStaff.name} - ${selectedStaff.store_name}）としてログイン中`;

            // 入力タイプ情報表示
            updateRoleInfo();

            // 既存のシフト希望を読み込み
            await loadExistingPreferences();
            // 月次コメントを読み込み
            await loadMonthlyComment();
            renderCal();
            refreshTips();
          } else {
            // 未連携：スタッフ登録画面を表示
            showStaffRegistration();
          }
        } catch (error) {
          console.error('LINE連携チェックエラー:', error);
          alert('LINE連携状態の確認に失敗しました');
        }
      }

      // ====== スタッフ登録画面表示 ======

          if (!card.querySelector('#profileBox')) {

        // 暫定: ダミーのスタッフコードを生成

        const employmentType =
          document.getElementById('regEmploymentType').value;
        const email = document.getElementById('regEmail').value;
        const phone = document.getElementById('regPhone').value;

        // バリデーション

          alert('必須項目を入力してください');
          return;
        }

        // 雇用形態から役職IDを自動判定

          alert('役職の判定に失敗しました。雇用形態を正しく選択してください。');
          return;

        const regResult = document.getElementById('regResult');

        regSubmitBtn.disabled = true;
        regSubmitBtn.textContent = '登録中...';

        try {
          const res = await fetch(`${API_BASE}/api/liff/register-staff`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${window._login.idToken}`,
            },
            body: JSON.stringify({
              tenant_id: TENANT_ID,
              store_id: parseInt(storeId),
              role_id: roleId, // 雇用形態から自動判定された役職ID
              name: name,
              staff_code: staffCode, // TODO: バックエンド修正後はnullに変更
              employment_type: employmentType,
              email: email || null,
              phone_number: phone || null,
            }),
          });

          const data = await res.json();

          if (data.success) {
            regResult.style.display = 'block';
            regResult.className = 'success';
            regResult.textContent =
              '✅ 登録が完了しました！画面を再読み込みします...';

            regResult.textContent = `❌ ${data.error}`;
            regSubmitBtn.disabled = false;
            regSubmitBtn.textContent = '登録する';

          regResult.textContent = '❌ 登録中にエラーが発生しました';

      // ====== カレンダー描画 ======

      function ymd(d) {
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }

      function renderCal() {
        // 月ラベル
        const year = cur.getFullYear();
        const month = cur.getMonth() + 1;
        ymLabel.textContent = `${year}年 ${month}月`;

        // 締切判定
        const isPastDeadline = isDeadlinePassed(
          year,
          month,
          getEmploymentType()
        );

        // グリッド
        calGrid.innerHTML = '';
        const firstDow = new Date(cur).getDay();
        const max = new Date(year, month, 0).getDate();

        // 先頭空白
        for (let i = 0; i < firstDow; i++) {
          const s = document.createElement('div');
          s.className = 'cell disabled';
          calGrid.appendChild(s);
        }

        for (let d = 1; d <= max; d++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          const date = new Date(year, month - 1, d);
          const key = ymd(date);

          const dot = document.createElement('div');
          dot.className = 'd';
          dot.textContent = d;
          const label = document.createElement('div');
          label.className = 'label';
          label.textContent = '';

          // 締切後は全ての日付を選択不可
          if (isPastDeadline) {
            cell.classList.add('disabled');
            cell.style.opacity = '0.3';
            cell.style.cursor = 'not-allowed';
          }
          // 社員の場合：第1案の出勤日にマーカーと時刻を表示（選択は任意の日でOK）

              timeLabel.className = 'shift-time';
              timeLabel.textContent = `${formatTime(shiftTime.start)}-${formatTime(shiftTime.end)}`;

            }
          }

          // 既存選択の反映
          const val = selected.get(key);
          if (val) {
            if (val.type === 'part') {
              cell.classList.add('pt-selected');
              label.textContent = val.label || 'OK';
            } else {
              cell.classList.add('em-selected');
              label.textContent = '出勤不可';
            }

            label.style.display = 'none';
          }

          cell.appendChild(label);
          calGrid.appendChild(cell);

          cell.onclick = () => {

        }

        // 解除

          cell.classList.remove('pt-selected', 'em-selected');
          label.style.display = 'none';
          refreshCount();
          return;

        // 新規選択

          selected.set(key, { type: 'emp' });

          label.style.display = 'block';
          label.textContent = '出勤不可';

          // アルバイト：希望日/パターン/時刻適用

          if (mode === 'allday') {

            end = `${endHour.padStart(2, '0')}:${endMinute}`;

          selected.set(key, { type: 'part', start, end, label: tag });
          cell.classList.add('pt-selected');
          label.style.display = 'block';
          label.textContent = tag;
        }

        refreshCount();

        if (role === 'emp') {
          if (!firstPlanExistsForEmp) {
            alert(`現在シフトの入力が開始していません。`);
            return;
          }
          // else if (firstPlanWorkDays.length === 0) {
          //   alert(
          //     `${year}年${month}月の第1案にあなたの出勤予定がありません。出勤予定が登録されるまでお待ちください。`
          //   );
          //   return;
          // }
        }

        if (!selectedStaff) {
          alert('スタッフを選択してください');
          return;
        }

        const hasComment =
          document.getElementById('monthlyComment').value.trim().length > 0;
        const hasShifts = selected.size > 0;

        // シフトもコメントもない場合はエラー
        if (!hasShifts && !hasComment) {
          alert('シフト希望またはコメントを入力してください');
          return;
        }

        // 確認メッセージ
        let confirmMsg = '';
        if (hasShifts && hasComment) {
          confirmMsg = `${selected.size}日分のシフト希望とコメントを送信しますか？`;
        } else if (hasShifts) {
          confirmMsg = `${selected.size}日分のシフト希望を送信しますか？`;
        } else {
          confirmMsg = 'コメントを送信しますか？';
        }

        if (!confirm(confirmMsg)) {
          return;
        }

        try {
          const results = [];

          // シフト希望を送信（0件でも既存データ削除のため必ず呼ぶ）
          // 選択された日付を1日1レコード形式の配列に変換
          const preferences = [];

          selected.forEach((value, key) => {
            // key = "YYYY-MM-DD" 形式の日付
            const pref = {
              preference_date: key,
              is_ng: value.type === 'emp', // 社員の場合はNG日
              notes: '',
            };

            // アルバイトの場合は時刻情報を追加
            if (value.type === 'part') {
              pref.start_time = value.start || null;
              pref.end_time = value.end || null;
            }

            preferences.push(pref);
          });

          // 一括登録APIを使用
          const requestBody = {
            tenant_id: TENANT_ID,
            store_id: selectedStaff.store_id,
            staff_id: selectedStaff.staff_id,
            preferences: preferences,
            year: year,
            month: month,
          };

          const url = `${API_BASE}/api/shifts/preferences/bulk`;

          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${window._login.idToken}`,
            },
            body: JSON.stringify(requestBody),
          });

          const result = await response.json();

          if (result.success) {
            if (result.inserted > 0) {
              results.push(`シフト希望${result.inserted}件`);
            } else if (result.deleted > 0) {
              results.push(`シフト希望クリア`);
            }
          } else {
            throw new Error(result.error || 'シフト送信に失敗しました');
          }

          // コメントを保存
          const commentResult = await saveMonthlyComment();
          if (commentResult.success && !commentResult.skipped) {
            results.push('コメント');
          }

          // 結果表示
          const box = document.getElementById('resultBox');
          box.style.display = 'block';
          box.textContent = `✅ ${results.join('と')}を送信しました！`;
          box.className = 'success';

          // 送信後、既存データを再読み込み
          await loadExistingPreferences();
          renderCal();
        } catch (error) {
          const box = document.getElementById('resultBox');
          box.style.display = 'block';
          box.textContent = `❌ エラー: ${error.message}`;
          box.className = 'danger';
        }
      };

      // ====== コメント入力イベント ======
      document
        .getElementById('monthlyComment')
        .addEventListener('input', () => {
          updateCommentUI();
        });

      // 初期化
      (async function () {
        await initLIFF();
        await loadDeadlineSettings(); // 期限設定を読み込み
        // MVP: パターン入力を廃止 (Issue #103)
        // renderPatterns();
        renderCal();
        refreshTips();
        updateCommentUI(); // 初期状態のコメントUI更新
      })();
    </script>
  </body>
</html>
